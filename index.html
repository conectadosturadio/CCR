<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Color Caribe Radio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Inter',sans-serif;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* CONTENEDOR PRINCIPAL */
.ccr-container{
width:100%;
max-width:1200px;
margin:auto;
padding:15px;
}

/* LOGO */
.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:100%;
max-width:500px;
margin:auto;
}

/* PLAYER */
.player{
width:100%;
height:120px;
background:#111;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:20px;
}

/* IFRAME WEB */
.web-frame{
width:100%;
height:70vh;
border:none;
border-radius:10px;
}

/* RESPONSIVE */
img{
max-width:100%;
height:auto;
}

video{
max-width:100%;
height:auto;
}

iframe{
max-width:100%;
}

@media (max-width:768px){

.ccr-container{
padding:10px;
}

.player{
height:100px;
}

.web-frame{
height:65vh;
}

}

</style>

</head>

<body>

<div class="ccr-container">

<div class="logo">
<img src="https://raw.githubusercontent.com/conectadosturadio/imagenes-clientes-web/refs/heads/main/logo-CCR-FINAL5.png">
</div>

<div class="player">
Tu reproductor o contenido aquí
</div>

<iframe 
class="web-frame"
src="https://conectadosturadio.github.io/CCR/">
</iframe>

</div>

</body>
</html>
